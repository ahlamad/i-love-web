<!doctype html>
<title>View Transitions</title>
<style>
button {
    background: #008C45;
    color: #fff;
    view-transition-name: knop;

    &.gekocht {
        font-size: 2em;
        background: #CD212A;
        position: fixed;
        right: 3em;
        bottom: 3em;
        scale: 1.5;
    }
}

::view-transition-old(knop),
::view-transition-new(knop) {
    animation-duration: 10s;
}
/* voorkom rare crossfade blur */
::view-transition-old(knop) {
    animation-name: none;
}

::view-transition-new(knop) {
    animation-name: none;
}

</style>
<script type="module">
const btn = document.querySelector('button');
btn.addEventListener('click', function() {
    if (document.startViewTransition) {
        document.startViewTransition(function() {
            btn.textContent = 'Gekocht!'
            btn.classList.add('gekocht');
        });
    } else {
        btn.textContent = 'Gekocht!'
        btn.classList.add('gekocht');
    }
});
</script>
<button>Koop een pizza!</button>
